project.name=sample

resources.source.1.type=file
resources.source.1.config.file=/home/rundeck/projects/sample/etc/resources.xml
resources.source.1.config.format=resourcexml

service.NodeExecutor.default.provider=jsch-ssh
service.FileCopier.default.provider=jsch-scp

# ───── 노드 전역 환경변수 (deploy scripts가 사용) ─────
# 노드에서 ssh 실행 시 자동으로 export됨 (Rundeck 4.x+).
# secret 값은 Key Storage 참조로 별도 export 필요.
project.globals.NEXUS_BASE=http://nexus:8081
project.globals.PIP_INDEX_URL=http://nexus:8081/repository/pypi-group/simple
project.globals.PIP_TRUSTED_HOST=nexus

# Note: 메트릭은 Jenkins post에서 push한다 (cicd_deploy_total 등).
# Rundeck notification.urls는 단순 GET 트리거라 Pushgateway POST와 맞지 않다.
