# Rundeck Job: 통합 배포 잡 (VM 환경)
#
# 사용:
#   rd jobs load --file rundeck/projects/sample/jobs/deploy-app.yaml --project sample
#
# 변경 요약 (Docker → VM):
#   - 컨테이너 교체 → systemd + symlink 기반 배포
#   - Spring: Nexus maven-releases에서 JAR 다운로드
#   - React:  Nexus releases에서 tar.gz 다운로드 → /var/www/html/sample-react
#   - FastAPI: Nexus releases에서 tar.gz + venv 새로 생성
#   - sha256 체크섬 검증 추가
#   - notification에 webhook(Pushgateway/MailHog) 추가
#
# 옵션 'app'에 따라 다른 deploy script를 실행한다.
# 모든 script는 /var/lib/rundeck/project-scripts/sample/ 에 사전 배포되어 있다고 가정.
- name: deploy-app
  description: |
    Nexus의 release artifact를 받아 대상 VM에 배포한다 (systemd 기반).
    - app:          sample-react | sample-spring | sample-fastapi
    - version:      플러그인이 선택한 artifact 식별자
                     (spring: maven version, react/fastapi: tar.gz 파일명)
    - release_name: r-<app>-<TS> 형식의 release name
    - env:          dev | stg | prod
    - team:         빌드/배포한 팀 (메트릭/메일 라벨링용)
  loglevel: INFO
  executionEnabled: true
  scheduleEnabled: false
  group: applications

  options:
    - name: app
      required: true
      enforced: true
      values:
        - sample-react
        - sample-spring
        - sample-fastapi
      description: 배포할 앱
    - name: version
      required: true
      description: Nexus artifact 식별자 (Jenkins가 전달)
    - name: release_name
      required: true
      description: r-<app>-<TS> 형식
    - name: env
      required: true
      enforced: true
      values: [dev, stg, prod]
    - name: team
      required: false
      value: unknown

  nodefilters:
    dispatch:
      threadcount: 5
      keepgoing: false
      successOnEmptyNodeFilter: false
    filter: 'tags: ${option.env}+${option.app}'

  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      # 앱별 배포 스크립트 분기.
      # 모든 스크립트는 노드의 /var/lib/rundeck/project-scripts/sample/ 에 미리 배포되어
      # 있어야 한다 (Rundeck rd-scripts copy 또는 ansible로 사전 배포).
      - description: 'Run app-specific deploy script'
        script: |
          #!/bin/bash
          set -euo pipefail

          APP="@option.app@"
          RELEASE_NAME="@option.release_name@"
          APP_VERSION="@option.version@"
          ENV_NAME="@option.env@"
          TEAM="@option.team@"

          SCRIPT_DIR="/var/lib/rundeck/project-scripts/sample"
          case "$APP" in
              sample-spring)  SCRIPT="$SCRIPT_DIR/deploy-spring.sh"  ;;
              sample-react)   SCRIPT="$SCRIPT_DIR/deploy-react.sh"   ;;
              sample-fastapi) SCRIPT="$SCRIPT_DIR/deploy-fastapi.sh" ;;
              *) echo "Unknown app: $APP" ; exit 1 ;;
          esac

          if [ ! -x "$SCRIPT" ]; then
              echo "Deploy script not found or not executable: $SCRIPT"
              exit 1
          fi

          # 환경변수 export (deploy script가 사용)
          export APP RELEASE_NAME APP_VERSION ENV_NAME TEAM
          export NEXUS_BASE NEXUS_USER NEXUS_PASS PIP_INDEX_URL PIP_TRUSTED_HOST

          bash "$SCRIPT"

  notification:
    onsuccess:
      email:
        recipients: '${option.team}@example.com'
        subject: '[Rundeck][deploy][success] ${option.app} ${option.release_name} → ${option.env}'
    onfailure:
      email:
        recipients: '${option.team}@example.com,${option.env}-oncall@example.com'
        subject: '[Rundeck][deploy][FAILED] ${option.app} ${option.release_name} → ${option.env}'

  # Note: 메트릭은 Jenkins 측에서 push한다. Rundeck의 notification.urls는 단순 GET 트리거라
  # Pushgateway의 POST 요구와 맞지 않다. Jenkins deployPipeline의 finally 블록에서 Rundeck
  # 잡의 success/failure 결과를 받아 cicd_deploy_total 메트릭을 push하므로, 여기서 중복으로
  # 처리할 필요는 없다.
