# Rundeck Job: 롤백 (VM 환경)
#
# /opt/<app>/releases/ 또는 /var/www/<app>/releases/ 에 보관된 이전 release로 복귀.
# target_release를 비우면 직전 release로, 명시하면 해당 release로.
- name: rollback-app
  description: '/opt/<app>/releases/ 의 이전 버전으로 롤백 (최근 3개 보관)'
  loglevel: INFO
  executionEnabled: true
  scheduleEnabled: false
  group: applications

  options:
    - name: app
      required: true
      enforced: true
      values: [sample-react, sample-spring, sample-fastapi]
    - name: env
      required: true
      enforced: true
      values: [dev, stg, prod]
    - name: target_release
      required: false
      description: '복귀할 release name. 비우면 직전 버전(previous)으로.'
    - name: team
      required: false
      value: unknown

  nodefilters:
    dispatch:
      threadcount: 5
      keepgoing: false
    filter: 'tags: ${option.env}+${option.app}'

  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      - description: 'Run rollback script'
        script: |
          #!/bin/bash
          set -euo pipefail

          export APP="@option.app@"
          export ENV_NAME="@option.env@"
          export TEAM="@option.team@"
          export TARGET_RELEASE="@option.target_release@"

          SCRIPT="/var/lib/rundeck/project-scripts/sample/rollback.sh"
          if [ ! -x "$SCRIPT" ]; then
              echo "Rollback script not found: $SCRIPT"
              exit 1
          fi
          bash "$SCRIPT"

  notification:
    onsuccess:
      email:
        recipients: '${option.team}@example.com,${option.env}-oncall@example.com'
        subject: '[Rundeck][rollback][success] ${option.app} → ${option.env}'
    onfailure:
      email:
        recipients: '${option.team}@example.com,${option.env}-oncall@example.com'
        subject: '[Rundeck][rollback][FAILED] ${option.app} → ${option.env}'
  # 메트릭은 Jenkins rollbackPipeline의 finally가 push (Rundeck 결과 수신 후).
