server {
  listen 80;
  server_name grafana.example.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name grafana.example.com;

  ssl_certificate     /etc/nginx/certs/grafana/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/grafana/privkey.pem;

  proxy_read_timeout 300;
  proxy_send_timeout 120;
  client_max_body_size 50M;

  # Docker 내장 DNS(127.0.0.11)로 업스트림을 '요청 시점'에 지연 해석한다.
  # 변수 proxy_pass 와 함께 쓰면 grafana 가 부팅 시 미기동이어도 nginx 는 정상 기동하고,
  # grafana 가 뜨기 전엔 502 를 반환하다가 자동 연결된다(기동 순서 비의존 + 재시작 시 IP 재해석).
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $grafana_upstream grafana:3000;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto "https";
    proxy_pass http://$grafana_upstream;
  }

  # Grafana Live (WebSocket) — 실시간 패널/로그 tail 용
  location /api/live/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto "https";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_pass http://$grafana_upstream;
  }
}
