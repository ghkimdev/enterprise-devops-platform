server {
    listen 80;
    server_name jenkins.ghlab.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jenkins.ghlab.dev;

    ssl_certificate /etc/nginx/certs/jenkins/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/jenkins/privkey.pem;

    client_max_body_size 1G;

    # 업스트림 지연 해석: jenkins 가 (재)기동 중이어도 nginx 는 정상 동작, 준비되면 자동 연결.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $jenkins_upstream jenkins:8080;

    location / {
        proxy_pass http://$jenkins_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 대응
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
