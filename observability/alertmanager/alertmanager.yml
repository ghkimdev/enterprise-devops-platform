global:
  smtp_smarthost: 'mailhog:1025'
  smtp_from: 'alertmanager@example.com'
  smtp_require_tls: false

route:
  # 우리가 실제로 emit 하는 라벨로 그룹화 (alertname/domain/instance)
  group_by: ['alertname', 'domain', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  # 기본 수신자 — 매칭 안 되는 모든 알림은 devops 로 (기존의 정의 안 된 team-X-mails 수정)
  receiver: devops-team

  routes:
    # Watchdog — 항상 발화하는 신호. 이메일이 아니라 외부 DeadMansSwitch 로만 보낸다.
    - matchers: [ 'alertname = "Watchdog"' ]
      receiver: watchdog
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1m
      continue: false

    # 배포 실패는 소유 팀으로 라우팅 (DeployFailed 가 app 라벨을 가짐).
    # critical 은 devops 에도 함께 통지하기 위해 continue: true.
    - matchers: [ 'app =~ "sample-spring|.*spring.*"' ]
      receiver: payment-team
      continue: true
    - matchers: [ 'app =~ "sample-react|.*react.*"' ]
      receiver: web-team
      continue: true
    - matchers: [ 'app =~ "sample-fastapi|.*fastapi.*"' ]
      receiver: ml-team
      continue: true

    # 모든 critical 은 devops 로 (페이징 대상)
    - matchers: [ 'severity = "critical"' ]
      receiver: devops-team

# critical 이 떠 있으면 같은 대상(alertname+instance)의 warning 은 음소거.
# Watchdog(severity=none)은 음소거 대상에서 제외.
inhibit_rules:
  - source_matchers: [ 'severity = "critical"' ]
    target_matchers: [ 'severity = "warning"' ]
    equal: ['alertname', 'instance']

receivers:
  - name: 'devops-team'
    email_configs:
      - to: 'devops-team@example.com'

  - name: 'payment-team'
    email_configs:
      - to: 'payment-team@example.com'

  - name: 'web-team'
    email_configs:
      - to: 'web-team@example.com'

  - name: 'ml-team'
    email_configs:
      - to: 'ml-team@example.com'

  # Watchdog 수신자 — 외부 dead man's switch(healthchecks.io 등)의 ping URL.
  # 이 알림이 끊기면 외부 모니터가 관측 스택 장애로 판단한다.
  - name: 'watchdog'
    webhook_configs:
      - url: 'https://hc-ping.example.com/REPLACE_WITH_DEADMANSSWITCH_UUID'
        send_resolved: false
