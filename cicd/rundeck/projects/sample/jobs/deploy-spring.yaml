# Rundeck Job: 통합 배포 잡 (VM 환경)
#
# 사용:
#   rd jobs load --file rundeck/projects/sample/jobs/deploy-app.yaml --project sample
#
#   - Spring: Nexus maven-releases에서 JAR 다운로드
#   - React:  Nexus releases에서 tar.gz 다운로드 → /var/www/html/sample-react
#   - FastAPI: Nexus releases에서 tar.gz + venv 새로 생성
#
- name: deploy-spring
  description: |
    - app:          sample-spring
    - version:      플러그인이 선택한 artifact 식별자
                     (spring: maven version)
    - release_name: r-<app>-<TS> 형식의 release name
    - env:          dev | stg | prod
    - team:         빌드/배포한 팀 (메트릭/메일 라벨링용)
  loglevel: INFO
  executionEnabled: true
  scheduleEnabled: false
  group: applications

  options:
    - name: app
      required: true
      value: sample-spring
    - name: version
      required: true
      description: Nexus artifact 식별자 (Jenkins가 전달)
    - name: release_name
      required: true
      description: r-<app>-<TS> 형식
    - name: env
      required: true
      enforced: true
      values: [dev, stg, prod]
    - name: team
      required: false
      value: unknown
    - name: nexus_user
      secure: true
      valueExposed: true
      storagePath: keys/project/sample/nexus-user
    - name: nexus_pass
      secure: true
      valueExposed: true
      storagePath: keys/project/sample/nexus-pass

  nodefilters:
    dispatch:
      threadcount: 5
      keepgoing: false
      successOnEmptyNodeFilter: false
    filter: 'tags: ${option.env}+${option.app}'

  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      # 앱별 배포 스크립트 분기.
      # 모든 스크립트는 노드의 /var/lib/rundeck/project-scripts/sample/ 에 미리 배포되어
      # 있어야 한다 (Rundeck rd-scripts copy 또는 ansible로 사전 배포).
      - description: 'Run app-specific deploy script'
        script: |
          #!/bin/bash
          set -euo pipefail

          NEXUS_BASE="@globals.NEXUS_BASE@"
          APP="@option.app@"
          RELEASE_NAME="@option.release_name@"
          APP_VERSION="@option.version@"
          ENV_NAME="@option.env@"
          TEAM="@option.team@"
          NEXUS_USER="@option.nexus_user@"
          NEXUS_PASS="@option.nexus_pass@"

          SCRIPT_DIR="/var/lib/rundeck/project-scripts/sample"
          SCRIPT="$SCRIPT_DIR/deploy-spring.sh"

          if [ ! -x "$SCRIPT" ]; then
              echo "Deploy script not found or not executable: $SCRIPT"
              exit 1
          fi

          # 환경변수 export (deploy script가 사용)
          export APP RELEASE_NAME APP_VERSION ENV_NAME TEAM
          export NEXUS_BASE NEXUS_USER NEXUS_PASS

          bash "$SCRIPT"

  notification:
    onsuccess:
      email:
        recipients: '${option.team}@example.com'
        subject: '[Rundeck][deploy][success] ${option.app} ${option.release_name} → ${option.env}'
    onfailure:
      email:
        recipients: '${option.team}@example.com,${option.env}-oncall@example.com'
        subject: '[Rundeck][deploy][FAILED] ${option.app} ${option.release_name} → ${option.env}'

