jenkins:
  systemMessage: "Legacy CI/CD Pipeline"
  numExecutors: 5
  securityRealm:
    ldap:
      configurations:
        - server: "${LDAP_URL}"
          rootDN: "${LDAP_BASE_DN}"
          userSearchBase: "${LDAP_USER_BASE}"
          userSearch: "uid={0}"
          groupSearchBase: "${LDAP_ROLE_BASE}"
          managerDN: "${LDAP_BIND_DN}"
          managerPasswordSecret: "${LDAP_BIND_PASSWORD}"
  authorizationStrategy:
    projectMatrix:
      entries:
        - group:
            name: "authenticated"
            permissions:
              - "View/Delete"
              - "View/Read"
              - "View/Configure"
              - "View/Create"
              - "Job/Read"
              - "Job/Build"
              - "Job/Configure"
              - "Job/Create"
              - "Job/Delete"
              - "Job/Discover"
              - "Job/Move"
              - "Job/Workspace"
              - "Job/Cancel"
              - "Run/Delete"
              - "Run/Replay"
              - "Run/Update"
              - "SCM/Tag"
              - "Overall/Administer"
        - user:
            name: "anonymous"
            permissions:
              - "Overall/Read"
jobs:
  - file: /var/jenkins_home/seed/seed.groovy

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: svn-creds
              username: "${LDAP_ADMIN_USER}"
              password: "${LDAP_BIND_PASSWORD}"
              description: "SVN Admin Account"

          - usernamePassword:
              id: nexus-creds
              username: "${LDAP_ADMIN_USER}"
              password: "${LDAP_BIND_PASSWORD}"
              description: "Nexus Admin Account"

unclassified:
  location:
    url: "https://jenkins.example.com"
    adminAddress: "admin@example.com"

  mailer:
    smtpHost: "mailhog"
    smtpPort: "1025"

  rundeckNotifier:
    rundeckInstances:
      - name: "default"
        url: "http://rundeck:4440"
        login: "${LDAP_ADMIN_USER}"
        password: "${LDAP_BIND_PASSWORD}"
        apiVersion: "34"

  globalLibraries:
    libraries:
      - name: "sample-shared"
        implicit: false
        allowVersionOverride: true
        includeInChangesets: true
        retriever:
          modernSCM:
            scm:
              subversion:
                remoteBase: "http://svn/svn/jenkins-shared-library/trunk"
                credentialsId: "svn-creds"
