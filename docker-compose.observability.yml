# docker-compose.observability.yml
#
# Layer 4 — 관측성(Observability) 스택. core 스택 위에 선택적으로 얹는다.
#
# 사용:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# 구성:
#   [메트릭] Prometheus · Pushgateway · cAdvisor · node-exporter
#   [로그]   Loki · Grafana Alloy (Promtail 후속; Promtail은 2026-03 EOL)
#   [시각화] Grafana (LDAP SSO)
#   [알림]   Alertmanager → 기존 MailHog
#
# 설계 원칙:
#   - 기존 cicd-net에 external로 조인 (nodes 레이어와 동일 패턴)
#   - Grafana만 사용자 접점(nginx 경유), 나머지는 내부 전용
#   - 모든 설정은 파일 마운트로 코드화 (UI 클릭 0)
#   - CI/CD 이력: Pushgateway(최신 상태) + Loki(이벤트 이력) 분리

services:

  # ── 메트릭 저장·스크랩 ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    hostname: prometheus.example.com
    restart: unless-stopped
    user: root
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── CI/CD 이력: 배치 잡 메트릭 수신 (최신 상태) ─────────────────────
  # Jenkins 파이프라인 post 블록에서 결과/소요시간 게이지를 push.
  # 주의: 그룹 키는 app/team/env로 고정 → 매 실행 덮어쓰기 (build_number 금지).
  pushgateway:
    image: prom/pushgateway:v1.10.0
    container_name: pushgateway
    hostname: pushgateway.example.com
    restart: unless-stopped
    user: root
    command:
      - '--persistence.file=/data/pushgateway.store'   # 재기동 시 유지
      - '--persistence.interval=5m'
    volumes:
      - pushgateway_data:/data
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 로그 저장 ───────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    hostname: loki.example.com
    restart: unless-stopped
    user: root
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 8
      start_period: 40s

  # ── 로그 수집 에이전트 (Promtail 후속) ──────────────────────────────
  # docker 소켓으로 컨테이너를 자동 발견해 stdout 로그를 Loki로 전송.
  alloy:
    image: grafana/alloy:v1.5.1
    container_name: alloy
    hostname: alloy.example.com
    restart: unless-stopped
    user: root                       # docker.sock 접근 필요
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    networks:
      - cicd-net
    depends_on:
      loki:
        condition: service_healthy

  # ── 시각화 (LDAP SSO + as-code 프로비저닝) ──────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    hostname: grafana.example.com
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SERVER_ROOT_URL: "https://grafana.example.com"
      GF_SERVER_ENFORCE_DOMAIN: "false"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_LDAP_ENABLED: "true"
      GF_AUTH_LDAP_CONFIG_FILE: "/etc/grafana/ldap.toml"
      GF_AUTH_LDAP_ALLOW_SIGN_UP: "true"
    volumes:
      - ./observability/grafana/ldap.toml:/etc/grafana/ldap.toml:ro
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

  # ── 알림 (→ 기존 MailHog SMTP 재사용) ───────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    hostname: alertmanager.example.com
    restart: unless-stopped
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 컨테이너 단위 메트릭 ────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 호스트 단위 메트릭 ──────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - cicd-net

  # ── 엔드포인트 도달성 + TLS 인증서 만료 프로빙 ──────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    hostname: blackbox.example.com
    restart: unless-stopped
    volumes:
      - ./observability/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
      - ./nginx/certs/ca.crt:/etc/blackbox_exporter/ca.crt:ro   # 사설 CA로 검증
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9115/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── LDAP(SSO) 헬스 ──────────────────────────────────────────────────
  # 전제: slapd의 cn=Monitor 백엔드가 활성화돼 있어야 메트릭이 나온다.
  # 미설정 시 blackbox가 기본 도달성(up/down)을 커버.
  # 비밀번호는 환경변수(LDAP_PASS)로 주입 — 커맨드라인 노출 회피.
  openldap-exporter:
    image: tomcz/openldap_exporter:v2.2.0   # 미러 다수 존재 — 배포 전 이미지/태그 확인
    container_name: openldap-exporter
    restart: unless-stopped
    environment:
      LDAP_ADDR: "ldap:389"
      LDAP_USER: "cn=admin,dc=example,dc=com"
      LDAP_PASS: "${LDAP_BIND_PASSWORD}"
      PROM_ADDR: ":9330"
      INTERVAL: "30s"
    networks:
      - cicd-net

  # ── Nginx(정문) 트래픽 ──────────────────────────────────────────────
  # 전제: nginx/conf.d/status.conf (stub_status, 내부 8088) 가 로드돼 있어야 함.
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    container_name: nginx-exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx:8088/stub_status'
    networks:
      - cicd-net

# 기존 docker-compose.yml의 cicd-net과 자동 merge.
networks:
  cicd-net:
    external: true
    name: cicd-net

volumes:
  prometheus_data:
  pushgateway_data:
  loki_data:
  alloy_data:
  grafana_data:
  alertmanager_data:
